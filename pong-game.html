<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
            font-size: 2.5em;
        }

        #gameCanvas {
            border: 3px solid #00ff88;
            background-color: #0f3460;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            cursor: none;
            display: block;
        }

        .scoreboard {
            display: flex;
            gap: 40px;
            color: #00ff88;
            font-size: 1.5em;
            text-shadow: 0 0 10px #00ff88;
        }

        .score {
            text-align: center;
        }

        .score-label {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .score-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        .controls {
            color: #00ff88;
            text-align: center;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .controls p {
            margin: 5px 0;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #00ff88;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            font-size: 2em;
            display: none;
            border: 2px solid #00ff88;
            z-index: 100;
        }

        .game-over p {
            margin: 10px 0;
        }

        .game-over button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 1em;
            background-color: #00ff88;
            border: none;
            border-radius: 5px;
            color: #0f3460;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .game-over button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PONG</h1>
        
        <div class="scoreboard">
            <div class="score">
                <div class="score-label">Player</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score">
                <div class="score-label">Computer</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>

        <div style="position: relative;">
            <canvas id="gameCanvas" width="800" height="400"></canvas>
            <div class="game-over" id="gameOverScreen">
                <p id="gameOverMessage">Game Over!</p>
                <button onclick="resetGame()">Play Again</button>
            </div>
        </div>

        <div class="controls">
            <p>Controls: Use Mouse or Arrow Keys (↑↓) to move your paddle</p>
            <p>First to 5 wins!</p>
        </div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game objects
        const paddleWidth = 10;
        const paddleHeight = 80;
        const ballSize = 8;
        const winScore = 5;

        let playerPaddle = {
            x: 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 6
        };

        let computerPaddle = {
            x: canvas.width - 20,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 4.5
        };

        let ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 5,
            dy: 5,
            size: ballSize,
            speed: 5
        };

        let playerScore = 0;
        let computerScore = 0;
        let gameRunning = true;

        // Input handling
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            playerPaddle.y = Math.max(0, Math.min(mouseY - paddleHeight / 2, canvas.height - paddleHeight));
        });

        // Update player paddle position
        function updatePlayerPaddle() {
            if (keys['ArrowUp']) {
                playerPaddle.y = Math.max(0, playerPaddle.y - playerPaddle.speed);
            }
            if (keys['ArrowDown']) {
                playerPaddle.y = Math.min(canvas.height - playerPaddle.height, playerPaddle.y + playerPaddle.speed);
            }
        }

        // Update computer paddle (AI)
        function updateComputerPaddle() {
            const computerCenter = computerPaddle.y + computerPaddle.height / 2;
            const ballCenter = ball.y;

            if (computerCenter < ballCenter - 35) {
                computerPaddle.y = Math.min(canvas.height - computerPaddle.height, computerPaddle.y + computerPaddle.speed);
            } else if (computerCenter > ballCenter + 35) {
                computerPaddle.y = Math.max(0, computerPaddle.y - computerPaddle.speed);
            }
        }

        // Update ball position
        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall collision (top and bottom)
            if (ball.y - ball.size < 0 || ball.y + ball.size > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.size, Math.min(canvas.height - ball.size, ball.y));
            }

            // Paddle collision detection
            // Player paddle
            if (
                ball.x - ball.size < playerPaddle.x + playerPaddle.width &&
                ball.y > playerPaddle.y &&
                ball.y < playerPaddle.y + playerPaddle.height
            ) {
                ball.dx = -ball.dx;
                ball.x = playerPaddle.x + playerPaddle.width + ball.size;
                
                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - playerPaddle.y) / playerPaddle.height;
                ball.dy = (hitPos - 0.5) * 10;
            }

            // Computer paddle
            if (
                ball.x + ball.size > computerPaddle.x &&
                ball.y > computerPaddle.y &&
                ball.y < computerPaddle.y + computerPaddle.height
            ) {
                ball.dx = -ball.dx;
                ball.x = computerPaddle.x - ball.size;
                
                // Add spin based on where ball hits paddle
                const hitPos = (ball.y - computerPaddle.y) / computerPaddle.height;
                ball.dy = (hitPos - 0.5) * 10;
            }

            // Scoring
            if (ball.x < 0) {
                computerScore++;
                resetBall();
            } else if (ball.x > canvas.width) {
                playerScore++;
                resetBall();
            }

            // Check win condition
            if (playerScore >= winScore || computerScore >= winScore) {
                gameRunning = false;
                showGameOver();
            }
        }

        // Reset ball to center
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.dy = (Math.random() - 0.5) * 5;
        }

        // Draw functions
        function drawRect(x, y, width, height, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, width, height);
        }

        function drawCircle(x, y, radius, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawGame() {
            // Clear canvas
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center line
            ctx.strokeStyle = '#00ff88';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw paddles
            drawRect(playerPaddle.x, playerPaddle.y, playerPaddle.width, playerPaddle.height, '#00ff88');
            drawRect(computerPaddle.x, computerPaddle.y, computerPaddle.width, computerPaddle.height, '#ff006e');

            // Draw ball
            drawCircle(ball.x, ball.y, ball.size, '#ffbe0b');
        }

        function showGameOver() {
            const gameOverScreen = document.getElementById('gameOverScreen');
            const gameOverMessage = document.getElementById('gameOverMessage');
            
            if (playerScore >= winScore) {
                gameOverMessage.textContent = `You Win! ${playerScore}-${computerScore}`;
            } else {
                gameOverMessage.textContent = `Computer Wins! ${computerScore}-${playerScore}`;
            }
            
            gameOverScreen.style.display = 'block';
        }

        function updateScoreboard() {
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
        }

        function resetGame() {
            playerScore = 0;
            computerScore = 0;
            resetBall();
            playerPaddle.y = canvas.height / 2 - paddleHeight / 2;
            computerPaddle.y = canvas.height / 2 - paddleHeight / 2;
            gameRunning = true;
            document.getElementById('gameOverScreen').style.display = 'none';
            updateScoreboard();
        }

        // Game loop
        function gameLoop() {
            if (gameRunning) {
                updatePlayerPaddle();
                updateComputerPaddle();
                updateBall();
            }
            
            drawGame();
            updateScoreboard();
            requestAnimationFrame(gameLoop);
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
