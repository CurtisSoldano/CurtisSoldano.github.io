<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>I Is Curtis</title>
    <style>
        body {
            background-color: purple;
            margin: 0;
            padding: 0;
            text-align: center;
            font-family: Arial, sans-serif;
            color: white;
        }

        h1 {
            font-size: 40pt;
            margin-top: 40px;
        }

        img {
            margin-top: 30px;
            max-width: 80%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <h1>I Is Curtis</h1>

    <img id="idolImage" src="" alt="Random Teen Idol">

    <script>
        // Array of Unsplash random image queries
        const imageQueries = [
            "teen pop star portrait",
            "teen idol singer",
            "young music celebrity portrait",
            "teen heartthrob performer",
            "pop concert teenager singer"
        ];

        // Pick random query
        const randomQuery = imageQueries[Math.floor(Math.random() * imageQueries.length)];

        // Set image source using Unsplash random endpoint
        document.getElementById("idolImage").src =
            "https://source.unsplash.com/800x600/?" + encodeURIComponent(randomQuery);
    </script>

</body>
</html>
